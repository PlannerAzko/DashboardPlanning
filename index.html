<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard</title>
    <style>
        .green { color: green; }
        .yellow { color: yellow; }
        .red { color: red; }
    </style>
</head>
<body>
    <h1>Dashboard Summary</h1>

    <h2>Vendor Performance %</h2>
    <table border="1">
        <tr>
            <th>Vendor</th>
            <th>Performance %</th>
        </tr>
        <tr>
            <td>Vendor A</td>
            <td class="green">95%</td>
        </tr>
        <tr>
            <td>Vendor B</td>
            <td class="yellow">85%</td>
        </tr>
        <tr>
            <td>Vendor C</td>
            <td class="red">70%</td>
        </tr>
    </table>

    <h2>Language Composition Summary</h2>
    <table border="1">
        <tr>
            <th>Language</th>
            <th>Composition %</th>
        </tr>
        <tr>
            <td>English</td>
            <td class="green">92%</td>
        </tr>
        <tr>
            <td>Spanish</td>
            <td class="yellow">88%</td>
        </tr>
        <tr>
            <td>French</td>
            <td class="red">75%</td>
        </tr>
    </table>
</body>
</html>
