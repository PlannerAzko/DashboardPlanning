<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> LOGISTICS DASHBOARD | ORDER PLANNING AHI</title>
    <link rel="icon" href="https://yt3.googleusercontent.com/dUQD3wes_tbyfG4flb6l1MeNToiZTx8BU0O91r3TWzNkMtgosmpCG1YtDDWXi5QCTPWEo5_umCE=s128-c-k-c0x00ffffff-no-rj" type="image/png">
    <link rel="apple-touch-icon" href="https://yt3.googleusercontent.com/dUQD3wes_tbyfG4flb6l1MeNToiZTx8BU0O91r3TWzNkMtgosmpCG1YtDDWXi5QCTPWEo5_umCE=s180-c-k-c0x00ffffff-no-rj">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-datalabels@2.0.0"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: radial-gradient(circle at 50% 50%, #1a1a1a 0%, #0a0a0a 100%);
            background-attachment: fixed;
            color: #fff;
            padding-bottom: 60px; /* Space for marquee footer */
            overflow-x: hidden;
        }

        /* Background Animation */
        body::before {
            content: "";
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 50% 50%, rgba(211, 47, 47, 0.05) 0%, transparent 50%);
            animation: bgMove 20s infinite alternate ease-in-out;
            z-index: -1;
            pointer-events: none;
        }

        @keyframes bgMove {
            0% { transform: translate(-10%, -10%); }
            100% { transform: translate(10%, 10%); }
        }

        .header {
            background: linear-gradient(90deg, #d32f2f 0%, #c62828 100%);
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.5);
            position: relative;
            overflow: hidden;
        }

        /* Shine effect for header */
        .header::after {
            content: "";
            position: absolute;
            top: -50%;
            left: -100%;
            width: 50%;
            height: 200%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.2), transparent);
            transform: rotate(30deg);
            animation: shine 6s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            20% { left: 200%; }
            100% { left: 200%; }
        }

        .header h1 {
            font-size: 2.5em;
            font-weight: bold;
            letter-spacing: 2px;
            text-shadow: 0 0 15px rgba(255,255,255,0.3);
        }

        .container {
            max-width: 95%;
            margin: 0 auto;
            padding: 20px;
            opacity: 0;
            transform: translateY(20px);
            animation: pageLoad 1s ease-out forwards;
        }

        @keyframes pageLoad {
            to { opacity: 1; transform: translateY(0); }
        }

        /* Welcome Overlay Styles */
        #welcome-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            z-index: 9999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease, visibility 0.5s ease;
        }

        #welcome-overlay.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        /* Initializing Dashboard Overlay */
        #init-loader {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            z-index: 10000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.8s ease, visibility 0.8s ease;
            overflow: hidden;
        }

        #init-loader::before {
            content: "";
            position: absolute;
            width: 200%;
            height: 200%;
            background-image: 
                linear-gradient(rgba(211, 47, 47, 0.05) 1px, transparent 1px),
                linear-gradient(90deg, rgba(211, 47, 47, 0.05) 1px, transparent 1px);
            background-size: 50px 50px;
            transform: perspective(500px) rotateX(60deg) translateY(-100px);
            animation: gridMove 10s linear infinite;
            z-index: 1;
        }

        @keyframes gridMove {
            0% { transform: perspective(500px) rotateX(60deg) translateY(0); }
            100% { transform: perspective(500px) rotateX(60deg) translateY(50px); }
        }

        .tech-loader {
            position: relative;
            width: 200px;
            height: 200px;
            z-index: 2;
        }

        .tech-circle {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 2px solid transparent;
            border-radius: 50%;
        }

        .tech-circle-1 {
            width: 180px;
            height: 180px;
            border-top-color: #d32f2f;
            border-bottom-color: #d32f2f;
            animation: techRotate 4s linear infinite;
        }

        .tech-circle-2 {
            width: 140px;
            height: 140px;
            border-left-color: #ffd700;
            border-right-color: #ffd700;
            animation: techRotate 2s linear infinite reverse;
        }

        .tech-circle-3 {
            width: 100px;
            height: 100px;
            border: 2px dashed rgba(255, 255, 255, 0.2);
            animation: techRotate 8s linear infinite;
        }

        .tech-core {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: #d32f2f;
            border-radius: 50%;
            box-shadow: 0 0 30px #d32f2f;
            animation: corePulse 1.5s ease-in-out infinite;
        }

        .scanning-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ffd700, transparent);
            box-shadow: 0 0 15px #ffd700;
            z-index: 3;
            animation: scanMove 3s ease-in-out infinite;
        }

        @keyframes scanMove {
            0%, 100% { top: 20%; opacity: 0; }
            50% { top: 80%; opacity: 1; }
        }

        .system-status {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            font-size: 0.8em;
            text-align: center;
            z-index: 2;
        }

        @keyframes techRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        @keyframes corePulse {
            0%, 100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
        }

        #init-loader.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }

        .loader-text {
            position: relative;
            z-index: 2;
            color: #fff;
            font-size: 1.2em;
            font-weight: 300;
            letter-spacing: 8px;
            margin-top: 40px;
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            font-family: 'Courier New', Courier, monospace;
        }

        .loader-text span {
            display: inline-block;
            animation: letterBounce 1.5s infinite;
        }

        @keyframes letterBounce {
            0%, 100% { transform: translateY(0); opacity: 0.5; }
            50% { transform: translateY(-5px); opacity: 1; color: #ffd700; }
        }

        .welcome-content {
            text-align: center;
            max-width: 600px;
            width: 90%;
            padding: 40px;
            background: #1a1a1a;
            border-radius: 20px;
            border: 2px solid #d32f2f;
            box-shadow: 0 0 50px rgba(211, 47, 47, 0.3);
            animation: welcomePop 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .welcome-step.hidden {
            display: none;
        }

        /* Pivot Table Styles */
        .pivot-section {
            background-color: #2a2a2a;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
            border: 1px solid #444;
        }

        .pivot-table th {
            padding: 12px 8px;
            border: 1px solid #444;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 0.5px;
        }

        .pivot-table td {
            border: 1px solid #333;
            padding: 8px;
        }

        .pivot-table tr:hover td {
            background-color: #333 !important;
        }

        .pivot-table .sub-header th {
            font-size: 0.85em;
            background-color: #1a1a1a;
            color: #aaa;
        }

        .pivot-filter select:focus {
            border-color: #ffd700;
            box-shadow: 0 0 5px rgba(255, 215, 0, 0.3);
        }

        /* Store View visibility */
        .view-store .main-content,
        .view-store .kpi-container-four,
        .view-store .chart-body,
        .view-store .chart-container > .table-header:first-child,
        .view-store .extra-left {
            display: none !important;
        }

        .view-store .chart-section {
            grid-template-columns: 1fr 1fr;
        }

        .view-store .chart-container {
            background: transparent;
            border: none;
            box-shadow: none;
        }

        .view-store .extra-section {
            grid-template-columns: 1fr;
        }

        @keyframes welcomePop {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .welcome-logo {
            width: 120px;
            height: 120px;
            margin: 0 auto 25px;
            animation: logoPulse 2s infinite ease-in-out;
        }

        @keyframes logoPulse {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 5px rgba(211, 47, 47, 0.5)); }
            50% { transform: scale(1.05); filter: drop-shadow(0 0 20px rgba(211, 47, 47, 0.8)); }
        }

        .welcome-title {
            font-size: 2em;
            margin-bottom: 20px;
            color: #fff;
            font-weight: bold;
            line-height: 1.2;
        }

        .welcome-question {
            font-size: 1.2em;
            margin-bottom: 35px;
            color: #ccc;
            font-style: italic;
        }

        .welcome-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .welcome-btn {
            padding: 14px 45px;
            border-radius: 30px;
            border: none;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-iya {
            background: linear-gradient(135deg, #d32f2f 0%, #b71c1c 100%);
            color: white;
            box-shadow: 0 4px 15px rgba(211, 47, 47, 0.3);
        }

        .btn-iya:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(211, 47, 47, 0.5);
            filter: brightness(1.1);
        }

        .btn-tidak {
            background: #333;
            color: #eee;
            border: 1px solid #444;
        }

        .btn-tidak:hover {
            background: #444;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.4);
        }

        .filter-section {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
        }

        .filter-group label {
            font-size: 0.85em;
            font-weight: 600;
            color: #aaa;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .filter-group select,
        .filter-group input {
            padding: 12px;
            border: none;
            border-radius: 4px;
            background-color: #2a2a2a;
            color: #fff;
            font-size: 0.95em;
            cursor: pointer;
            transition: all 0.3s;
        }

        /* Multi-select styling */
        .multi-select-container {
            position: relative;
            background-color: #2a2a2a;
            border-radius: 4px;
            cursor: pointer;
            min-height: 45px;
        }

        .multi-select-display {
            padding: 12px;
            color: #fff;
            font-size: 0.95em;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .multi-select-display::after {
            content: '\f0d7';
            font-family: 'Font Awesome 6 Free';
            font-weight: 900;
            margin-left: 10px;
            color: #aaa;
        }

        .multi-select-options {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background-color: #2a2a2a;
            border: 1px solid #444;
            z-index: 3000;
            max-height: 300px;
            overflow-y: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            border-radius: 0 0 4px 4px;
        }

        .multi-select-options.show {
            display: block;
        }

        .option-item {
            padding: 10px 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: background 0.2s;
            border-bottom: 1px solid #333;
            font-size: 0.9em;
        }

        .option-item:hover {
            background-color: #3a3a3a;
        }

        .option-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #d32f2f;
        }

        .option-item label {
            margin-bottom: 0;
            cursor: pointer;
            color: #fff;
            flex: 1;
        }

        .select-all-btn {
            background-color: #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 1;
            font-weight: bold;
            color: #ffd700;
        }

        .filter-group select:hover,
        .filter-group input:hover,
        .filter-group select:focus,
        .filter-group input:focus {
            background-color: #3a3a3a;
            outline: none;
            border-bottom: 2px solid #d32f2f;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 25px;
        }

        .left-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .table-section {
            background-color: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .table-header {
            background-color: #1a1a1a;
            padding: 15px;
            font-weight: 600;
            color: #ffd700;
            border-bottom: 2px solid #d32f2f;
        }

        .table-content {
            max-height: 300px;
            overflow-y: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }

        table thead {
            background-color: #1a1a1a;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        table tfoot {
            background-color: #1a1a1a;
            position: sticky;
            bottom: 0;
            z-index: 10;
        }

        table tfoot td {
            font-weight: bold;
            color: #ffd700;
            border-top: 10px solid #2a2a2a; 
            box-shadow: inset 0 2px 0 0 #d32f2f;
            padding: 15px 12px; 
            border-bottom: none;
        }

        table th {
            padding: 12px;
            text-align: left;
            color: #ffd700;
            border-bottom: 1px solid #444;
            font-weight: 600;
        }

        table td {
            padding: 10px 12px;
            border-bottom: 1px solid #333;
        }

        table tbody tr:hover {
            background-color: #3a3a3a;
        }

        /* Sortable Table Header */
        .sortable-header {
            cursor: pointer;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            transition: all 0.3s ease;
        }

        .sortable-header:hover {
            color: #ffed4e;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.3);
        }

        .sort-indicator {
            display: inline-block;
            font-size: 0.8em;
            opacity: 0.6;
            min-width: 12px;
            transition: opacity 0.3s ease;
        }

        .sort-indicator.active {
            opacity: 1;
            color: #ffed4e;
        }

        /* Summary Table Specific Styles */
        .summary-table {
            width: 100%;
            border-collapse: collapse;
        }
        .summary-table th {
            padding: 12px 10px;
            font-size: 1em;
            background-color: #1a1a1a;
            color: #ffd700;
            border-bottom: 2px solid #333;
        }
        .summary-table td {
            padding: 12px 10px;
            border-bottom: 1px solid #222;
            font-size: 1.15em;
        }
        .summary-table tbody tr:nth-child(even) {
            background-color: #222;
        }
        .summary-table tbody tr:hover {
            background-color: #333;
            box-shadow: inset 0 0 10px rgba(211, 47, 47, 0.2);
            cursor: default;
        }

        .kpi-container {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
        }

        .kpi-container-four {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .kpi-card {
            border-radius: 8px;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .kpi-card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
        }

        .kpi-card::before {
            content: "";
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.1), transparent);
            transition: 0.5s;
        }

        .kpi-card:hover::before {
            left: 100%;
        }

        .kpi-card.yellow {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #000;
            border-bottom: 4px solid #b8860b;
        }

        .kpi-card.yellow:hover {
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.4);
        }

        .kpi-card.red {
            background: linear-gradient(135deg, #ff6b6b 0%, #ff4444 100%);
            color: #fff;
            border-bottom: 4px solid #8b0000;
        }

        .kpi-card.red:hover {
            box-shadow: 0 0 20px rgba(255, 68, 68, 0.4);
        }

        .kpi-card.blue {
            background: linear-gradient(135deg, #006994 0%, #00a8e8 100%);
            color: #fff;
            border-bottom: 4px solid #004c6d;
        }

        .kpi-card.blue:hover {
            box-shadow: 0 0 20px rgba(0, 168, 232, 0.4);
        }

        .kpi-card.green {
            background: linear-gradient(135deg, #0d9488 0%, #2dd4bf 100%);
            color: #fff;
            border-bottom: 4px solid #065f46;
        }

        .kpi-card.green:hover {
            box-shadow: 0 0 20px rgba(45, 212, 191, 0.4);
        }

        .kpi-card.gray {
            background: linear-gradient(135deg, #4b5563 0%, #1f2937 100%);
            color: #fff;
            border-bottom: 4px solid #111827;
        }

        .kpi-card.gray:hover {
            box-shadow: 0 0 20px rgba(75, 85, 99, 0.4);
        }

        .kpi-label {
            font-size: 0.85em;
            font-weight: 600;
            margin-bottom: 8px;
            opacity: 0.9;
        }

        .kpi-value {
            font-size: 2.2em;
            font-weight: bold;
            letter-spacing: 1px;
        }

        .right-panel {
            background-color: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        #map {
            width: 100%;
            height: 600px;
            border-radius: 4px;
        }

        .bottom-table {
            background-color: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }

        .table-content-large {
            max-height: 650px;
            overflow-y: auto;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #1a1a1a;
        }

        ::-webkit-scrollbar-thumb {
            background: #d32f2f;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #ff6b6b;
        }

        .loading {
            text-align: center;
            padding: 40px;
            font-size: 1.2em;
            color: #ffd700;
        }

        .spinner {
            border: 4px solid #3a3a3a;
            border-top: 4px solid #d32f2f;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .pagination {
            text-align: center;
            padding: 0.5px;
            color: #aaa;
            font-size: 0.9em;
        }

        .pagination button {
            background-color: #3a3a3a;
            color: #fff;
            border: none;
            padding: 8px 12px;
            margin: 0 5px;
            cursor: pointer;
            border-radius: 4px;
        }

        .pagination button:hover {
            background-color: #d32f2f;
        }

        /* Chart Styles */
        .chart-section {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 25px;
        }

        .chart-container {
            background-color: #2a2a2a;
            border-radius: 4px;
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
        }

        .chart-body {

        /* Marquee Footer Styles */

        }

            border-left: 4px solid #ffd700;

            padding: 15px 20px;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 0.95em;
        }
    </style>
</head>
<body>
    <!-- PAGE CONTENT HERE -->
    <div class="header">
        <h1>LOGISTICS DASHBOARD | ORDER PLANNING AHI</h1>
    </div>

    <div class="container">
        <!-- Table dengan sorting feature -->
        <div class="astor-sla-section">
            <div class="astor-sla-header">
                DETAIL OUTSTANDING ORDER (STUFFING BELUM TERISI)
            </div>
            <div class="bottom-table">
                <div class="table-content-large">
                    <table id="outstandingOrderTable">
                        <thead>
                            <tr>
                                <th class="sortable-header" data-column="0">
                                    Order ID
                                    <span class="sort-indicator">⬍</span>
                                </th>
                                <th class="sortable-header" data-column="1">
                                    Toko
                                    <span class="sort-indicator">⬍</span>
                                </th>
                                <th class="sortable-header" data-column="2">
                                    Tanggal
                                    <span class="sort-indicator">⬍</span>
                                </th>
                                <th class="sortable-header" data-column="3">
                                    Qty
                                    <span class="sort-indicator">⬍</span>
                                </th>
                                <th class="sortable-header" data-column="4">
                                    Status
                                    <span class="sort-indicator">⬍</span>
                                </th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data akan dimuat di sini -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="footer-marquee">
        <div class="marquee-content">
            📦 LOGISTICS DASHBOARD v1.0 | Monitoring Real-Time Order & Stuffing | 🚚 Optimized for Performance
        </div>
    </div>

    <script>
        // ===== TABLE SORTING FEATURE =====
        class TableSorter {
            constructor(tableId) {
                this.table = document.getElementById(tableId);
                this.sortState = {}; // Track sort state untuk setiap kolom
                this.initSortHeaders();
            }

            initSortHeaders() {
                const headers = this.table.querySelectorAll('.sortable-header');
                headers.forEach(header => {
                    header.addEventListener('click', () => this.handleSort(header));
                });
            }

            handleSort(header) {
                const colIndex = parseInt(header.dataset.column);
                const tbody = this.table.querySelector('tbody');
                const rows = Array.from(tbody.querySelectorAll('tr'));

                // Determine sort direction
                let isAscending = !this.sortState[colIndex] || this.sortState[colIndex] === 'desc';

                // Reset all indicators
                this.table.querySelectorAll('.sort-indicator').forEach(indicator => {
                    indicator.textContent = '⬍';
                    indicator.classList.remove('active');
                });

                // Update current indicator
                const indicator = header.querySelector('.sort-indicator');
                indicator.textContent = isAscending ? '⬆' : '⬇';
                indicator.classList.add('active');

                // Sort rows
                rows.sort((rowA, rowB) => {
                    const cellA = rowA.children[colIndex].textContent.trim();
                    const cellB = rowB.children[colIndex].textContent.trim();

                    // Try to sort as numbers
                    const numA = parseFloat(cellA);
                    const numB = parseFloat(cellB);

                    let comparison = 0;
                    if (!isNaN(numA) && !isNaN(numB)) {
                        comparison = numA - numB;
                    } else {
                        comparison = cellA.localeCompare(cellB, 'id-ID');
                    }

                    return isAscending ? comparison : -comparison;
                });

                // Reorder rows
                rows.forEach(row => tbody.appendChild(row));

                // Update sort state
                this.sortState[colIndex] = isAscending ? 'asc' : 'desc';
            }
        }

        // Initialize table sorter when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new TableSorter('outstandingOrderTable');
        });
    </script>
</body>
