<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vendor Performance Summary</title>
    <style>
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            border: 1px solid #ddd;
            padding: 8px;
        }
        .green {
            background-color: #d4edda;
        }
        .yellow {
            background-color: #fff3cd;
        }
        .red {
            background-color: #f8d7da;
        }
    </style>
</head>
<body>
    <h1>Vendor Performance Summary</h1>
    <div>
        <h2>Percentage Breakdown</h2>
        <!-- Add percentage breakdown content here -->
    </div>
    <h2>Vendor Performance Summary Table</h2>
    <table>
        <tr>
            <th>Vendor</th>
            <th>Performance (%)</th>
        </tr>
        <tr class="green">
            <td>Vendor A</td>
            <td>95%</td>
        </tr>
        <tr class="yellow">
            <td>Vendor B</td>
            <td>85%</td>
        </tr>
        <tr class="red">
            <td>Vendor C</td>
            <td>75%</td>
        </tr>
        <tr class="green">
            <td>Vendor D</td>
            <td>92%</td>
        </tr>
    </table>
</body>
</html>
